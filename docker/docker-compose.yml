version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - minio
    volumes:
      - ../storage:/app/storage
      - ../catalog:/app/catalog

  minio:
    image: quay.io/minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  chroma:
    image: chromadb/chroma
    ports:
      - "8001:8000"
    volumes:
      - ../storage/chroma:/chroma/chroma

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow:
    image: apache/airflow:2.9.0
    depends_on:
      - postgres
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: nasa-lakehouse-secret
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _PIP_ADDITIONAL_REQUIREMENTS: "deltalake boto3 anthropic duckdb pandas pyarrow"
    volumes:
      - ../dags:/opt/airflow/dags
      - ../storage:/opt/airflow/storage
      - ../ingestion:/opt/airflow/ingestion
      - ../gold:/opt/airflow/gold
      - ../catalog:/opt/airflow/catalog
    ports:
      - "8080:8080"
    command: standalone

volumes:
  minio_data:
  postgres_data: